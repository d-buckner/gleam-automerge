name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_nif:
    name: Build NIF — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build NIF (Linux via cross)
        if: runner.os == 'Linux'
        run: |
          cross build --release \
            --target ${{ matrix.target }} \
            --manifest-path native/automerge_nif/Cargo.toml

      - name: Build NIF (macOS native)
        if: runner.os == 'macOS'
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --manifest-path native/automerge_nif/Cargo.toml

      - name: Package artifact with checksum
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          EXT=$([ "${{ runner.os }}" = "Linux" ] && echo "so" || echo "dylib")
          SRC="target/${TARGET}/release/libautomerge_nif.${EXT}"
          DEST="libautomerge_nif-${VERSION}-${TARGET}.${EXT}"
          cp "$SRC" "$DEST"
          shasum -a 256 "$DEST" > "${DEST}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.target }}
          path: |
            libautomerge_nif-*
            *.sha256

  release:
    name: Create GitHub Release
    needs: build_nif
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            libautomerge_nif-*
            *.sha256
